services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: smsfecho
      POSTGRES_PASSWORD: smsfecho
      POSTGRES_DB: smsfecho
    ports:
      # Host 5433 to avoid clashing with sparmanikfarm's 5432.
      - "5433:5432"
    volumes:
      - smsfecho-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smsfecho -d smsfecho"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://smsfecho:smsfecho@db:5432/smsfecho?schema=public
      DATABASE_SSL: "false"
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
      AUTH_URL: http://localhost:3001
      AUTH_TRUST_HOST: "true"
      UPLOAD_DIR: /app/uploads
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  smsfecho-db:
